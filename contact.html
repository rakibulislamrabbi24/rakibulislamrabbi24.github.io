<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="bg-glow"></div>

<nav>
    <div class="logo">
        <img src="Logo.png" alt="Logo">
    </div>
    <div class="nav-right">
        <div class="top-widgets">
            <div class="theme-toggle" id="themeToggle">☀️ 🌙</div>
            <div class="live-time">
                <div id="clock"></div>
                <div id="date"></div>
            </div>
        </div>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <ul id="navMenu">
            <li><a href="index.html">Home</a></li>
            <li><a href="skills.html">Skills</a></li>
            <li><a href="about.html">About Me</a></li>
            <li><a href="contact.html">Contact Me</a></li>
        </ul>
    </div>
</nav>

<section class="page">
    <h1>CONTACT ME</h1>
    <p class="mini-text">Let's build something awesome together or just say hello!</p>

    <div class="social-grid">
        <a href="https://www.facebook.com/RakibulRabbi24" class="social-card" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
            <div>
                <h3>Facebook</h3>
                <p>Connect socially</p>
            </div>
        </a>

        <a href="https://www.instagram.com/RakibulRabbi24" class="social-card" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" alt="Instagram">
            <div>
                <h3>Instagram</h3>
                <p>Creative moments</p>
            </div>
        </a>

        <a href="https://x.com/RakibulRabbi24" class="social-card" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/5968/5968830.png" alt="X">
            <div>
                <h3>X / Twitter</h3>
                <p>Thoughts & updates</p>
            </div>
        </a>

        <a href="https://wa.me/8550314932831" class="social-card" target="_blank">
            <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" alt="WhatsApp">
            <div>
                <h3>WhatsApp</h3>
                <p>Direct messaging</p>
            </div>
        </a>
    </div>

    <div class="form-container">
        <h2>Send a Message</h2>
        <form action="https://formspree.io/f/your-formspree-id" method="POST" class="contact-form">
            <div class="form-group">
                <input type="text" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
            </div>
            <button type="submit" class="btn primary-btn" style="width: 100%; border: none; cursor: pointer;">Send Message</button>
        </form>
    </div>
</section>

<script>
function toggleMenu(){
    document.getElementById("navMenu").classList.toggle("show");
}

document.getElementById("themeToggle").onclick=()=>{
    document.body.classList.toggle("light-mode");
}

function updateClock(){
    const now = new Date();
    document.getElementById("clock").innerHTML = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
    document.getElementById("date").innerHTML = now.toLocaleDateString('en-US',{weekday:'short',day:'numeric',month:'short'});
}
setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
