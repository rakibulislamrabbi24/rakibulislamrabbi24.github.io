<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="overlay"></div>

<nav>

<div class="logo">
<img src="Logo.png" alt="Logo">
</div>

<div class="theme-toggle" id="theme-toggle">

<span>☀️</span>
<span>🌙</span>

</div>

<div class="menu-toggle" id="menu-toggle">

<span></span>
<span></span>
<span></span>

</div>

<ul id="nav-links">

<li><a href="index.html">Home</a></li>
<li><a href="about.html">About</a></li>
<li><a href="skills.html">Skills</a></li>
<li><a href="projects.html">Projects</a></li>
<li><a href="contact.html">Contact</a></li>

</ul>

</nav>

<section class="contact-section">

<div class="contact-container">

<h1>
CONTACT ME
</h1>

<p>

For collaborations, or creative discussions,
send me a direct message.

</p>

<form id="whatsapp-form">

<input type="text" id="name" placeholder="Your Name" required>

<input type="email" id="email" placeholder="Your Email" required>

<textarea id="message" placeholder="Write Your Message..." required></textarea>

<button type="submit">

Send Message

</button>

</form>

<div class="warning-box">

⚠️ This website is currently under development.
Some information and sections may be incomplete or partially accurate.

</div>

</div>

</section>

<script>

const menuToggle = document.getElementById('menu-toggle');
const navLinks = document.getElementById('nav-links');

menuToggle.onclick = () => {
navLinks.classList.toggle('show');
}

const themeToggle = document.getElementById('theme-toggle');

themeToggle.onclick = () => {

document.body.classList.toggle('light-mode');

if(document.body.classList.contains('light-mode')){

localStorage.setItem('theme','light');

}else{

localStorage.setItem('theme','dark');

}

}

if(localStorage.getItem('theme') === 'light'){

document.body.classList.add('light-mode');

}

document.getElementById('whatsapp-form').addEventListener('submit', function(e){

e.preventDefault();

const name = document.getElementById('name').value;
const email = document.getElementById('email').value;
const message = document.getElementById('message').value;

const whatsappMessage =
`Hello, I contacted you from your portfolio website.%0A%0AName: ${name}%0AEmail: ${email}%0A%0AMessage:%0A${message}`;

window.open(
`https://wa.me/8550314932831?text=${whatsappMessage}`,
'_blank'
);

});

</script>

</body>
</html>
