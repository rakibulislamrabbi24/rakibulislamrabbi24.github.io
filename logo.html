<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rabbi Neon Logo</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: transparent;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
    }

    .logo {
        font-family: 'Great Vibes', cursive;
        font-size: clamp(70px, 12vw, 180px);
        color: #ff1a1a;
        display: flex;
        gap: 2px;
        user-select: none;
    }

    .logo span {
        position: relative;
        animation: blink 2.5s infinite;
        text-shadow:
            0 0 5px #ff0000,
            0 0 10px #ff0000,
            0 0 20px #ff0000,
            0 0 40px #ff0000,
            0 0 80px #ff0000;
    }

    .logo span:nth-child(1) {
        animation-delay: 0s;
    }

    .logo span:nth-child(2) {
        animation-delay: 0.2s;
    }

    .logo span:nth-child(3) {
        animation-delay: 0.4s;
    }

    .logo span:nth-child(4) {
        animation-delay: 0.6s;
    }

    .logo span:nth-child(5) {
        animation-delay: 0.8s;
    }

    @keyframes blink {
        0%, 100% {
            opacity: 1;
            filter: brightness(1.2);
            transform: scale(1);
        }

        10% {
            opacity: 0.4;
            filter: brightness(0.5);
        }

        20% {
            opacity: 1;
            filter: brightness(1.6);
        }

        50% {
            opacity: 0.85;
        }

        70% {
            opacity: 1;
            transform: scale(1.03);
        }
    }

    /* Optional electric flicker overlay */
    .logo::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle, rgba(255,0,0,0.15), transparent 70%);
        filter: blur(25px);
        z-index: -1;
        animation: pulse 2s infinite alternate;
    }

    @keyframes pulse {
        from {
            opacity: 0.4;
            transform: scale(0.98);
        }

        to {
            opacity: 1;
            transform: scale(1.02);
        }
    }
</style>
</head>
<body>

<div class="logo">
    <span>R</span>
    <span>a</span>
    <span>b</span>
    <span>b</span>
    <span>i</span>
</div>

</body>
</html>
