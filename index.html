<script>
const letters=document.querySelectorAll("#loki-title span");

const fonts=[
"'Poppins',sans-serif",
"'Georgia',serif",
"'Courier New',monospace",
"'Impact',sans-serif",
"'Trebuchet MS',sans-serif",
"'Verdana',sans-serif",
"'Arial Black',sans-serif"
];

function randomizeLetters(){
letters.forEach(letter=>{

if(letter.innerHTML!=="&nbsp;"&&Math.random()>0.72){

letter.style.fontFamily=fonts[Math.floor(Math.random()*fonts.length)];

letter.classList.add("glitch-letter");

setTimeout(()=>{
letter.classList.remove("glitch-letter");
},220);

}

});
}

setInterval(randomizeLetters,550);
</script>


<script>
function toggleMenu(){
document.getElementById("navMenu").classList.toggle("show");
}

document.getElementById("themeToggle").onclick=()=>{
document.body.classList.toggle("light-mode");
}

function updateClock(){
const now = new Date();

document.getElementById("clock").innerHTML =
now.toLocaleTimeString('en-US',{
hour:'2-digit',
minute:'2-digit',
hour12:true
});

document.getElementById("date").innerHTML =
now.toLocaleDateString('en-US',{
weekday:'short',
day:'numeric',
month:'short'
});
}

setInterval(updateClock,1000);
updateClock();
</script>
