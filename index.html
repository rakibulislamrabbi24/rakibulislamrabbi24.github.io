<script>

/* MOBILE MENU */

const menuToggle =
document.getElementById('menu-toggle');

const navLinks =
document.getElementById('nav-links');

menuToggle.onclick = () => {

navLinks.classList.toggle('show');

}

/* DARK LIGHT MODE */

const themeToggle =
document.getElementById('theme-toggle');

themeToggle.onclick = () => {

document.body.classList.toggle('light-mode');

if(document.body.classList.contains('light-mode')){

localStorage.setItem('theme','light');

}else{

localStorage.setItem('theme','dark');

}

}

if(localStorage.getItem('theme') === 'light'){

document.body.classList.add('light-mode');

}

/* TYPING TEXT */

const texts = [

"Movie Lover",
"Creative Enthusiast",
"Digital Creator",
"Dreamer",
"Explorer",
"Storyteller",
"Tech Enthusiast"

];

let count = 0;
let index = 0;
let currentText = '';
let letter = '';

(function type(){

if(count === texts.length){

count = 0;

}

currentText = texts[count];

letter = currentText.slice(0, ++index);

document.getElementById('typing-text').textContent = letter;

if(letter.length === currentText.length){

count++;

index = 0;

setTimeout(type,1500);

}else{

setTimeout(type,100);

}

})();

/* LOKI TITLE EFFECT */

const letters =
document.querySelectorAll("#loki-title span");

const fonts = [

"'Poppins',sans-serif",
"'Courier New',monospace",
"'Georgia',serif",
"'Impact',sans-serif",
"'Trebuchet MS',sans-serif",
"'Times New Roman',serif",
"'Verdana',sans-serif",
"'Tahoma',sans-serif",
"'Lucida Console',monospace",
"'Palatino Linotype',serif",
"'Gill Sans',sans-serif",
"'Comic Sans MS',cursive",
"'Arial Black',sans-serif",
"'Garamond',serif",
"'Brush Script MT',cursive"

];

function randomizeLetters(){

letters.forEach(letter=>{

if(letter.innerHTML !== "&nbsp;"){

const randomFont =
fonts[
Math.floor(Math.random()*fonts.length)
];

const shadows = [

"0 0 10px rgba(255,0,0,0.4)",
"0 0 20px rgba(255,255,255,0.2)",
"0 0 30px rgba(255,0,0,0.45)"

];

const randomShadow =
shadows[
Math.floor(Math.random()*shadows.length)
];

letter.style.fontFamily = randomFont;

letter.style.textShadow = randomShadow;

letter.classList.add("glitch-letter");

setTimeout(()=>{

letter.classList.remove("glitch-letter");

},250);

}

});

}

setInterval(randomizeLetters,700);

</script>
